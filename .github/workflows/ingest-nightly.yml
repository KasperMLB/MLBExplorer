name: Nightly ingest + grading

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compute target date (America/Chicago)
        id: target_date
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          with open(__import__("os").environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("date=" + datetime.now(ZoneInfo("America/Chicago")).date().isoformat() + "\n")
          PY
        shell: bash
      - name: Nightly ingest
        run: |
          python -m mlb_dashboard.ingest --date ${{ steps.target_date.outputs.date }}
      - name: Grade recent dates
        run: |
          python -m mlb_dashboard.tracking_sync --days 3
      - name: Health check (strict)
        run: |
          python -m mlb_dashboard.health_check --target-date ${{ steps.target_date.outputs.date }} --lookback-days 7 --strict
      - name: Publish artifacts to Hugging Face dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN GitHub Actions secret is required to publish artifacts." >&2
            exit 1
          fi
          if [ -z "$HF_REPO_ID" ]; then
            echo "HF_REPO_ID GitHub Actions secret is required and should point to the artifact dataset repo." >&2
            exit 1
          fi
          HF_REPO_TYPE="${HF_REPO_TYPE:-dataset}"
          echo "Publishing artifacts to Hugging Face ${HF_REPO_TYPE}: ${HF_REPO_ID}"
          python -m mlb_dashboard.publish --artifacts-dir artifacts --repo-id "$HF_REPO_ID" --repo-type "$HF_REPO_TYPE"
