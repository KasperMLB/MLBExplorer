name: Nightly ingest + grading

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compute target date (America/Chicago)
        id: target_date
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          print("date=" + datetime.now(ZoneInfo("America/Chicago")).date().isoformat())
          PY
        shell: bash
      - name: Nightly ingest
        run: |
          python -m mlb_dashboard.ingest --date ${{ steps.target_date.outputs.date }}
      - name: Grade recent dates
        run: |
          python -m mlb_dashboard.tracking_sync --days 3
      - name: Health check (strict)
        run: |
          python -m mlb_dashboard.health_check --target-date ${{ steps.target_date.outputs.date }} --lookback-days 7 --strict
